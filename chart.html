<!DOCTYPE html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>紫微斗數線上排盤｜國際日舜堂</title>
  <link rel="stylesheet" href="./css/theme.css" />
  <style>
    :root {
      --paper: #fffdf9;
      --ink: #2c1810;
      --border: #4a3228;
      --major: #1a237e;
      --green: #2e7d32;
      --red: #c62828;
      --purple: #6a1b9a;
      --line-red: #d32f2f;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      padding: 12px;
      overflow-x: hidden;
    }

    .layout {
      display: flex;
      gap: 16px;
      max-width: 100%;
      margin: 0 auto;
      align-items: flex-start;
      box-sizing: border-box;
    }

    .form-panel {
      width: 320px;
      flex-shrink: 0;
      padding: 14px;
      font-size: 17px;
    }

    .form-panel h2 {
      font-size: 19px;
      margin-bottom: 10px;
      letter-spacing: 0.1em;
    }

    .form-panel label { display: block; margin-bottom: 3px; color: #444; font-size: 17px; }
    .form-panel input[type="text"],
    .form-panel input[type="date"],
    .form-panel select {
      width: 100%;
      margin-bottom: 8px;
      padding: 7px 8px;
      font-family: inherit;
      font-size: 17px;
    }

    .form-panel .row { margin-bottom: 5px; }
    .form-panel .inline { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
    .form-panel button {
      width: 100%;
      margin-top: 6px;
      padding: 9px;
      color: #fff;
      border: none;
      cursor: pointer;
      font-family: inherit;
      font-size: 17px;
    }

    .form-panel button.secondary {
      color: var(--ink-muted);
    }

    .member-section {
      margin-top: 16px;
      padding-top: 14px;
    }

    .member-section h3 {
      font-size: 17px;
      margin-bottom: 8px;
      letter-spacing: 0.08em;
    }

    .member-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .member-actions button {
      margin-top: 0;
    }

    .member-actions .member-link-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      text-decoration: none;
      padding: 8px 10px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--paper-surface);
      color: inherit;
      font-family: inherit;
      font-size: inherit;
      cursor: pointer;
    }

    .chart-db-open-btn {
      margin-top: 10px;
    }

    .chart-panel {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
    }

    #chartView {
      flex: 1;
      min-width: 0;
    }

    .chart-database {
      flex: 1;
      min-width: 0;
      padding: 16px;
      display: flex;
      flex-direction: column;
      min-height: 520px;
    }

    .chart-db-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }

    .chart-db-header h2 {
      font-size: 20px;
      letter-spacing: 0.08em;
    }

    .chart-db-header button {
      width: auto;
      margin-top: 0;
      padding: 8px 16px;
      background: var(--paper-surface);
      color: var(--ink-muted);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      cursor: pointer;
      font-family: inherit;
      font-size: 15px;
    }

    .chart-db-search {
      display: flex;
      gap: 8px;
      margin-bottom: 8px;
    }

    .chart-db-search input[type="search"] {
      flex: 1;
      padding: 10px 12px;
      font-family: inherit;
      font-size: 16px;
      border: 1px solid #bbb;
    }

    .chart-db-search button {
      width: auto;
      margin-top: 0;
      padding: 10px 18px;
      white-space: nowrap;
      color: #fff;
      border: none;
      cursor: pointer;
      font-family: inherit;
      font-size: 16px;
    }

    .chart-db-status {
      font-size: 14px;
      color: #666;
      margin-bottom: 10px;
      min-height: 1.2em;
    }

    .chart-db-table-wrap {
      flex: 1;
      overflow: auto;
      border: 1px solid var(--border);
      background: var(--paper-muted);
      border-radius: var(--radius-sm);
    }

    .chart-db-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 15px;
      background: var(--paper-surface);
    }

    .chart-db-table th,
    .chart-db-table td {
      padding: 10px 14px;
      border-bottom: 1px solid #eee;
      text-align: left;
      vertical-align: middle;
    }

    .chart-db-table th {
      position: sticky;
      top: 0;
      font-weight: 700;
      white-space: nowrap;
      z-index: 1;
    }

    .chart-db-table tbody tr:hover {
      background: var(--paper-muted);
    }

    .chart-db-table .db-actions {
      display: flex;
      gap: 6px;
      white-space: nowrap;
    }

    .chart-db-table .db-actions button {
      width: auto;
      margin-top: 0;
      padding: 5px 10px;
      font-size: 14px;
      cursor: pointer;
      font-family: inherit;
      border: 1px solid var(--border);
      background: var(--paper-surface);
      border-radius: var(--radius-sm);
    }

    .chart-db-table .db-actions button.danger {
      color: #c62828;
      border-color: #e0a0a0;
    }

    .chart-db-table .db-actions button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .chart-db-table .db-actions button.save-active {
      color: #fff;
    }

    .chart-db-table .db-phone-input {
      width: 100%;
      min-width: 120px;
      padding: 6px 8px;
      font-family: inherit;
      font-size: 14px;
      border: 1px solid #ddd;
      background: #f5f5f5;
      color: #333;
    }

    .chart-db-table .db-phone-input.editing {
      background: #fff;
      border-color: #888;
    }

    .chart-db-table tr.editing-row {
      background: #fff8e8;
    }

    .chart-db-table tr .db-field-edit {
      display: none;
    }

    .chart-db-table tr.editing-row .db-field-view {
      display: none;
    }

    .chart-db-table tr.editing-row .db-field-edit {
      display: block;
    }

    .chart-db-table .db-name-input,
    .chart-db-table .db-gender-select {
      width: 100%;
      min-width: 72px;
      padding: 6px 8px;
      font-family: inherit;
      font-size: 14px;
      border: 1px solid #888;
      background: #fff;
    }

    .chart-db-table tr.editing-row .db-birth-edit {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: center;
    }

    .chart-db-table .db-birth-edit {
      display: none;
    }

    .chart-db-table .db-birth-edit select,
    .chart-db-table .db-birth-edit input[type="date"],
    .chart-db-table .db-birth-edit input[type="number"] {
      padding: 5px 6px;
      font-family: inherit;
      font-size: 13px;
      border: 1px solid #888;
      background: #fff;
    }

    .chart-db-table .db-birth-edit .db-lunar-year { width: 72px; }
    .chart-db-table .db-birth-edit .db-lunar-month,
    .chart-db-table .db-birth-edit .db-lunar-day { width: 52px; }

    .chart-db-table .db-birth-edit .db-leap-label {
      font-size: 13px;
      white-space: nowrap;
    }

    .chart-db-table .db-birth-edit .hidden {
      display: none !important;
    }

    .chart-db-empty {
      padding: 24px;
      text-align: center;
      color: #888;
      font-size: 15px;
    }

    @page {
      size: A4 landscape;
      margin: 8mm;
    }

    @media print {
      * {
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }

      html,
      body {
        margin: 0 !important;
        padding: 0 !important;
        width: auto;
        height: auto;
        overflow: visible;
        background: #fff;
      }

      #userBar,
      #adminPanel,
      .form-panel,
      .password-modal {
        display: none !important;
      }

      #appRoot,
      .layout {
        display: block !important;
        width: 100% !important;
        height: auto !important;
        max-width: none !important;
        margin: 0 !important;
        padding: 0 !important;
      }

      .chart-database {
        display: none !important;
      }

      .chart-panel {
        display: block !important;
        width: 100% !important;
        height: auto !important;
        margin: 0 auto !important;
        padding: 0 !important;
      }

      #chartView {
        display: block !important;
        width: 100% !important;
      }

      .chart-outer {
        box-sizing: border-box;
        width: 100% !important;
        max-width: calc(297mm - 16mm) !important;
        height: auto !important;
        max-height: calc(210mm - 16mm) !important;
        aspect-ratio: 6 / 4;
        margin: 0 auto !important;
        border: 2px double #222;
        page-break-inside: avoid;
      }

      .chart-grid {
        width: 100%;
        height: 100%;
      }

      .palace-cell.dimmed {
        opacity: 1 !important;
      }

      .center-top-right,
      .back-to-natal,
      .center-toggle-btn {
        display: none !important;
      }

      /* 列印 A4：整體字級放大 */
      .star-vcol.major .vname {
        font-size: 38px;
        letter-spacing: 2px;
      }

      .star-vcol.g-lg .vname {
        font-size: 32px;
      }

      .star-vcol.p-sm .vname,
      .star-vcol.g-sm .vname {
        font-size: 22px;
      }

      .star-vcol .vbright {
        font-size: 20px;
      }

      .star-vcol.major .vbright {
        font-size: 22px;
      }

      .star-vcol.flow .vname {
        font-size: 17px;
      }

      .star-vcol.major .mutagen,
      .mutagen {
        width: 28px;
        height: 28px;
        line-height: 26px;
        font-size: 28px;
      }

      .mutagen.horoscope {
        width: 24px;
        height: 24px;
        line-height: 22px;
        font-size: 24px;
      }

      .mutagen-circle {
        width: 26px;
        height: 26px;
        line-height: 24px;
        font-size: 26px;
      }

      .star-vcol.g-lg .mutagen-circle,
      .star-vcol.g-sm .mutagen-circle,
      .star-vcol.p-sm .mutagen-circle {
        width: 22px;
        height: 22px;
        line-height: 20px;
        font-size: 22px;
      }

      .palace {
        font-size: 22px;
      }

      .palace-label {
        font-size: 28px;
      }

      .gz-gan,
      .gz-zhi {
        font-size: 18px;
      }

      .daxian,
      .decadal-slot {
        font-size: 18px;
      }

      .monthly-badge {
        width: 26px;
        height: 26px;
        font-size: 18px;
      }

      .shen {
        font-size: 20px;
        line-height: 26px;
      }

      .center-info {
        font-size: 24px;
      }

      .center-birth,
      .center-age {
        font-size: 26px;
      }

      .center-bazi-text {
        font-size: 18px;
      }

      .center-wuxing-panel.wuxing-panel {
        width: 128px;
        height: 142px;
      }

      .center-wuxing-panel .wuxing-node-name {
        font-size: 14px;
      }

      .center-wuxing-panel .wuxing-node-count {
        font-size: 11px;
      }

      .center-birth .lunar-note {
        font-size: 20px;
      }

      .center-brand {
        font-size: 20px;
      }

      .vtext.tag {
        font-size: 24px;
      }

      .vtext.name {
        font-size: 38px;
      }

      .vtext.title {
        font-size: 42px;
      }

      .palace-bottom {
        height: 64px;
      }
    }

    .form-panel input[type="number"] {
      width: 100%;
      margin-bottom: 8px;
      padding: 7px 8px;
      font-family: inherit;
      font-size: 17px;
    }

    .date-row {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 6px;
    }

    .date-row label { font-size: 13px; margin-bottom: 2px; }

    .calendar-note {
      font-size: 13px;
      color: #2e7d32;
      margin: -2px 0 8px;
      font-weight: 600;
    }

    .chart-outer {
      border: 3px double var(--border);
      background: var(--paper);
      width: 100%;
      max-width: 100%;
      aspect-ratio: 6 / 4;
      margin: 0 auto;
    }

    @media (min-width: 901px) {
      .chart-outer {
        max-width: min(1280px, calc(100vw - 360px), calc((100vh - 80px) * 1.5));
      }
    }

    .chart-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      grid-template-rows: repeat(4, 1fr);
      position: relative;
      width: 100%;
      height: 100%;
    }

    .chart-lines {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 5;
    }

    .chart-lines line { stroke: var(--line-red); stroke-width: 1.5; }

    .cell {
      border: 1px solid var(--border);
      position: relative;
      z-index: 2;
      background: var(--paper);
      overflow: visible;
    }

    .cell.center {
      grid-row: 2 / 4;
      grid-column: 2 / 4;
      z-index: 4;
      overflow: hidden;
    }

    /* ── 宮位 ── */
    .palace {
      height: 100%;
      position: relative;
      padding: 2px 8px 0 3px;
      font-size: 20px;
      line-height: 1.15;
      cursor: pointer;
      overflow: visible;
    }

    .palace.highlight { background: #fff8e1; }
    .palace.focus-palace { outline: 2px solid var(--line-red); outline-offset: -2px; }

    .daily-days {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 62px;
      z-index: 4;
      font-size: 16px;
      line-height: 1.3;
      color: var(--green);
      letter-spacing: 0;
      text-align: center;
      white-space: nowrap;
      pointer-events: none;
    }

    .palace-bottom {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 58px;
      display: flex;
      justify-content: center;
      align-items: flex-end;
      z-index: 1;
    }

    .daily-day {
      padding: 0;
      border: none;
      background: none;
      font-family: inherit;
      font-size: inherit;
      color: inherit;
      cursor: pointer;
    }

    .daily-day:hover {
      text-decoration: underline;
    }

    .daily-day.active {
      font-weight: 700;
      color: #006064;
    }

    .palace-footer-dimmed .decadal-slot,
    .palace-footer-dimmed .gz-gan,
    .palace-footer-dimmed .palace-label,
    .palace-footer-dimmed .gz-zhi {
      color: #999 !important;
      opacity: 0.55;
    }

    .palace-footer-dimmed .decadal-slot.active {
      color: var(--line-red) !important;
      opacity: 0.65;
    }

    .palace-stars {
      position: absolute;
      top: 1px;
      left: 2px;
      right: 0;
      padding-right: 8px;
      display: flex;
      flex-direction: row;
      justify-content: space-between;
      align-items: flex-start;
      max-height: calc(100% - 60px);
      overflow: visible;
    }

    .stars-left {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 2px;
      flex-shrink: 0;
    }

    .stars-row {
      display: flex;
      flex-direction: row;
      align-items: flex-start;
      gap: 2px;
      flex-wrap: nowrap;
    }

    .stars-right {
      display: flex;
      flex-direction: row;
      align-items: flex-start;
      gap: 2px;
      flex-wrap: nowrap;
      justify-content: flex-end;
      margin-left: auto;
      padding-right: 2px;
    }

    .star-vcol {
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      flex-shrink: 0;
    }

    .vcol-inner {
      writing-mode: vertical-rl;
      text-orientation: upright;
      line-height: 1;
      display: inline-flex;
      align-items: flex-start;
    }

    .star-vcol .vname {
      writing-mode: vertical-rl;
      text-orientation: upright;
      line-height: 1;
      white-space: nowrap;
    }

    .star-vcol.major .vname {
      color: #0000FF;
      font-weight: 700;
      /* clamp: 大螢幕極限約 40px；矮螢幕自動縮小避免壓到宮名 */
      font-size: clamp(28px, 3.5vh, 40px);
      letter-spacing: 2px;
    }

    .star-vcol.g-lg .vname {
      color: var(--green);
      font-size: 28px;
      font-weight: 700;
      letter-spacing: 5px;
    }

    .star-vcol.p-sm .vname {
      color: var(--purple);
      font-size: 19px;
      font-weight: 600;
      letter-spacing: 2px;
    }

    .star-vcol.g-sm .vname {
      color: var(--green);
      font-size: 19px;
      font-weight: 600;
      letter-spacing: 2px;
    }

    .star-vcol .vbright {
      writing-mode: vertical-rl;
      text-orientation: upright;
      font-size: 17px;
      font-weight: 400;
      color: var(--ink);
    }

    .star-vcol.major .vbright {
      font-size: clamp(16px, 1.85vh, 22px);
    }

    .star-vcol .vtags { display: none; }

    .stars-row-1 {
      min-height: 20px;
    }

    .star-vcol.major .mutagen {
      writing-mode: horizontal-tb;
      width: clamp(24px, 2.6vh, 30px);
      height: clamp(24px, 2.6vh, 30px);
      line-height: calc(clamp(24px, 2.6vh, 30px) - 2px);
      font-size: clamp(24px, 2.7vh, 31px);
      margin-top: 2px;
      border: 1px solid;
      background: transparent;
    }

    .mutagen {
      display: inline-block;
      width: 24px;
      height: 24px;
      line-height: 22px;
      text-align: center;
      font-size: 26px;
      font-weight: 700;
      vertical-align: middle;
      border: 1px solid;
      background: transparent;
    }

    .mutagen.lu { color: var(--green); border-color: var(--green); }
    .mutagen.quan { color: #1565c0; border-color: #1565c0; }
    .mutagen.ke { color: var(--green); border-color: var(--green); }
    .mutagen.ji { color: var(--red); border-color: var(--red); }

    .mutagen.horoscope {
      border-style: dashed;
      width: 20px;
      height: 20px;
      line-height: 18px;
      font-size: 20px;
    }

    .mutagen-circle {
      display: inline-block;
      width: 22px;
      height: 22px;
      line-height: 20px;
      text-align: center;
      font-size: 23px;
      font-weight: 700;
      vertical-align: middle;
      border: 1px solid;
      border-radius: 50%;
      background: transparent;
      margin-top: 2px;
    }

    .mutagen-circle.lu { color: var(--green); border-color: var(--green); }
    .mutagen-circle.quan { color: #1565c0; border-color: #1565c0; }
    .mutagen-circle.ke { color: var(--green); border-color: var(--green); }
    .mutagen-circle.ji { color: var(--red); border-color: var(--red); }

    .star-vcol.g-lg .mutagen-circle,
    .star-vcol.g-sm .mutagen-circle,
    .star-vcol.p-sm .mutagen-circle {
      width: 18px;
      height: 18px;
      line-height: 16px;
      font-size: 18px;
    }

    .stars-center {
      display: flex;
      flex-direction: row;
      align-items: flex-start;
      gap: 2px;
      flex-shrink: 0;
      align-self: center;
      margin: 0 auto;
    }

    .star-vcol.flow .vname {
      color: #8b4513;
      font-size: 14px;
      font-weight: 600;
    }

    .chart-mode-tabs {
      display: flex;
      gap: 4px;
      margin-bottom: 4px;
    }

    .mode-tab {
      flex: 1;
      padding: 3px 0;
      border: 1px solid var(--border);
      background: var(--paper-muted);
      font-family: inherit;
      font-size: 12px;
      cursor: pointer;
      border-radius: var(--radius-sm);
    }

    .mode-tab.active {
      background: var(--ui-primary);
      color: #fff;
      border-color: var(--ui-primary);
    }

    .horoscope-date {
      display: flex;
      flex-direction: column;
      gap: 2px;
      margin-top: 4px;
      font-size: 12px;
    }

    .horoscope-date input[type="date"] {
      font-family: inherit;
      font-size: 12px;
      padding: 2px 4px;
    }

    .center-scope {
      margin-top: 3px;
      font-size: 13px;
      color: #8b4513;
      font-weight: 700;
    }

    .center-flow-scope {
      line-height: 1.45;
      margin-top: 2px;
    }

    .scope-range { font-weight: 400; color: #333; }

    .yearly-year input[type="number"] {
      font-family: inherit;
      font-size: 12px;
      padding: 2px 4px;
      width: 100%;
    }

    .palace-footer-grid {
      display: grid;
      grid-template-columns: auto auto;
      column-gap: 4px;
      row-gap: 0;
      align-items: end;
      line-height: 1.12;
    }

    .daxian,
    .decadal-slot {
      grid-column: 1;
      grid-row: 1;
      font-size: 15px;
      color: #333;
      white-space: nowrap;
      min-height: 1em;
      padding: 0;
      border: none;
      background: none;
      font-family: inherit;
      text-align: left;
      cursor: pointer;
    }

    .decadal-slot:hover {
      color: #8b4513;
      text-decoration: underline;
    }

    .decadal-slot.active {
      font-weight: 700;
      color: var(--line-red);
    }

    .monthly-badges {

  <script>
    function initChartApp() {
    const { astro } = iztro
    const { Lunar, LunarMonth, LunarYear, Solar } = LunarLib

    const BRANCH_POS = {
      巳: [0,0], 午: [0,1], 未: [0,2], 申: [0,3],
      辰: [1,0],                   酉: [1,3],
      卯: [2,0],                   戌: [2,3],
      寅: [3,0], 丑: [3,1], 子: [3,2], 亥: [3,3],
    }

    const GRID = [
      ['巳','午','未','申'],
      ['辰','C','C','酉'],
      ['卯','C','C','戌'],
      ['寅','丑','子','亥'],
    ]

    const HIGHLIGHT_GREEN = new Set([
      '天馬','天鉞','天魁','左輔','右弼','文昌','文曲',
      '地劫','地空','擎羊','祿存','鈴星','火星','陀羅',
    ])
    const LEFT_PURPLE = new Set([
      '解神','天刑','天廚','咸池','天空','天姚','陰煞','紅鸞','華蓋',
    ])
    const LEFT_GREEN = new Set(['三台','八座','恩光','天貴'])

    const EXCLUDED = new Set([
      '天德','台輔','天月','天喜','寡宿','天才','年解','鳳閣','天使','天哭',
      '天官','天虛','天福','天巫','月德','天壽','龍池','孤辰',
      '破碎','封誥','旬空','空亡','截路','蜚廉','截空','天傷',
    ])

    function filterStars(stars) {
      return stars.filter(s => !EXCLUDED.has(s.name))
    }

    function splitMinors(stars) {
      const filtered = filterStars(stars)
      return {
        leftPurple: filtered.filter(s => LEFT_PURPLE.has(s.name)),
        leftGreen: filtered.filter(s => LEFT_GREEN.has(s.name)),
        rightGreen: filtered.filter(s => HIGHLIGHT_GREEN.has(s.name)),
      }
    }

    let showLines = false
    let selectedPalaceName = '命宮'
    let initialChartType = 'natal'
    let yearlyYear = new Date().getFullYear()
    let horoscopeDate = ''
    let showYearlyDaily = false
    let yearlyMonthSelected = false
    let selectedFlowLunarYear = null
    let selectedFlowMonth = null
    let selectedFlowIsLeap = false
    let palaceClickTimer = null
    let currentInput = null
    let currentAstrolabe = null

    function resolveEffectiveChartMode() {
      if (initialChartType === 'yearly') return 'yearly'
      if (showLines) return 'decadal'
      return 'origin'
    }

    function horoscopeDateForYear(year, referenceDate) {
      const ref = referenceDate ? new Date(referenceDate + 'T12:00:00') : new Date()
      const m = ref.getMonth() + 1
      const day = Math.min(ref.getDate(), new Date(year, m, 0).getDate())
      return `${year}-${String(m).padStart(2, '0')}-${String(day).padStart(2, '0')}`
    }

    function horoscopeDateForYearMonthDay(year, month, day) {
      const daysInMonth = new Date(year, month, 0).getDate()
      const safeDay = Math.min(Math.max(day, 1), daysInMonth)
      return `${year}-${String(month).padStart(2, '0')}-${String(safeDay).padStart(2, '0')}`
    }

    function parseHoroscopeDateParts(date) {
      const [year, month, day] = date.split('-').map(Number)
      return { year, month, day }
    }

    function computeYearlyMonthlyByPalace(a, lunarYear, timeIndex) {
      const map = new Map()
      for (let month = 1; month <= 12; month++) {
        const date = horoscopeDateFromLunarYearMonthDay(lunarYear, month, 15, false)
        const h = a.horoscope(date, timeIndex)
        const idx = h.monthly.index
        const gz = `${h.monthly.heavenlyStem}${h.monthly.earthlyBranch}`
        map.set(idx, { month, gz })
      }
      return map
    }

    function computeYearlyDailyByPalace(a, lunarYear, lunarMonth, timeIndex, isLeapMonth = false) {
      const map = new Map()
      const totalDays = daysInLunarMonth(lunarYear, lunarMonth, isLeapMonth)
      for (let day = 1; day <= totalDays; day++) {
        const date = horoscopeDateFromLunarYearMonthDay(lunarYear, lunarMonth, day, isLeapMonth)
        const h = a.horoscope(date, timeIndex)
        const idx = h.daily.index
        if (!map.has(idx)) map.set(idx, [])
        map.get(idx).push(day)
      }
      return map
    }

    ]

    function sortMajorStars(stars) {
      const order = new Map(MAJOR_STAR_ORDER_RTL.map((name, index) => [name, index]))
      return [...stars].sort((a, b) => (order.get(b.name) ?? -1) - (order.get(a.name) ?? -1))
    }

    const BRANCH_ROTATION_ORDER = ['子','丑','寅','卯','辰','巳','午','未','申','酉','戌','亥']

    function parseLunarFromSolarDate(solarDate) {
      const [y, m, d] = solarDate.split('-').map(Number)
      const l = Solar.fromYmd(y, m, d).getLunar()
      const month = Math.abs(l.getMonth())
      return { year: l.getYear(), month, day: l.getDay(), isLeap: l.getMonth() < 0 }
    }

    function solarDateFromLunar(lunarYear, lunarMonth, lunarDay, isLeapMonth = false) {
      const ym = isLeapMonth ? -lunarMonth : lunarMonth
      const s = Lunar.fromYmd(lunarYear, ym, lunarDay).getSolar()
      const [y, m, d] = s.toYmd().split('-').map(Number)
      return `${y}-${String(m).padStart(2, '0')}-${String(d).padStart(2, '0')}`
    }

    function daysInLunarMonth(lunarYear, lunarMonth, isLeapMonth = false) {
      const ym = isLeapMonth ? -lunarMonth : lunarMonth
      const month = LunarMonth.fromYm(lunarYear, ym)
      return month ? month.getDayCount() : 30
    }

    function horoscopeDateFromLunarYearMonthDay(lunarYear, lunarMonth, lunarDay, isLeapMonth = false) {
      const maxDay = daysInLunarMonth(lunarYear, lunarMonth, isLeapMonth)
      const safeDay = Math.min(Math.max(lunarDay, 1), maxDay)
      return solarDateFromLunar(lunarYear, lunarMonth, safeDay, isLeapMonth)
    }

    function horoscopeDateForLunarYear(lunarYear, referenceDate = new Date()) {
      const refSolar = todaySolarDate(referenceDate)
      const refLunar = parseLunarFromSolarDate(refSolar)
      if (refLunar.year === lunarYear) {
        return horoscopeDateFromLunarYearMonthDay(refLunar.year, refLunar.month, refLunar.day, refLunar.isLeap)
      }
      return horoscopeDateFromLunarYearMonthDay(lunarYear, 1, 1, false)
    }

    function palaceIndexByBranch(a, branch) {
      return a.palaces.find(p => p.earthlyBranch === branch)?.index

    function lunarMonthAnchorSolar(lunarYear, lunarMonth, isLeapMonth = false) {
      try {

      } catch {
        return null
      }
    }

    function horoscopeScopeForMode(mode) {
      if (mode === 'decadal') return 'decadal'
      if (mode === 'yearly') return 'yearly'

    }

    function palaceNameScopeForMode(mode, options = {}) {
      if (mode === 'decadal') return 'decadal'
      if (mode === 'yearly') return options.useMonthlyPalaceNames ? 'monthly' : 'yearly'
      return 'origin'
    }

      if (mode === 'yearly') return h.yearly.heavenlyStem
      if (mode === 'decadal') return h.decadal.heavenlyStem
      return getNatalYearStem(a)
    }

    function getDisplayMutagen(h, a, mode, starName) {
      return getMutagenForStar(getMutagenStem(h, a, mode), starName)
    }

    function getScopePalaceName(h, palaceIndex, mode, natalName, options = {}) {
      if (mode === 'origin' || !h) return natalName
      const scope = palaceNameScopeForMode(mode, options)
      if (scope === 'origin') return natalName
      return h[scope].palaceNames[palaceIndex] || natalName
    }

    function getFlowStars(h, palaceIndex, mode) {
      if (mode === 'origin' || mode === 'decadal' || !h) return []
      if (mode === 'yearly') {
        const yearly = h.yearly.stars?.[palaceIndex] || []
        return yearly.map(s => s.name)
      }
      const decadal = h.decadal.stars?.[palaceIndex] || []
      const yearly = h.yearly.stars?.[palaceIndex] || []
      const names = new Set()
      decadal.forEach(s => names.add(s.name))
      yearly.forEach(s => names.add(s.name))
      return [...names]
    }

    function getSanFangBranchRoles(a, h, palaceName, mode, options = {}) {
      const scope = palaceNameScopeForMode(mode, options)
      const s = scope === 'origin'
        ? a.surroundedPalaces(palaceName)
        : h.surroundPalaces(palaceName, scope)
      const target = s.target.earthlyBranch
      const related = new Set([
        s.wealth.earthlyBranch,
        s.career.earthlyBranch,
        s.opposite.earthlyBranch,
      ])
      return {
        target,
        related,
        all: new Set([target, ...related]),
      }
    }

      const d = parts[2]
      const timeLabel = DB_TIME_LABELS[payload.timeIndex] ?? (payload.timeIndex + '時')

      return '國曆 ' + y + '年' + m + '月' + d + '日 ' + timeLabel

      const editBtn = row.querySelector('[data-edit-chart]')

        const gender = row.querySelector('.db-gender-select')?.value || '男'
        const phone = row.querySelector('.db-phone-input')?.value.trim() || ''
        if (!name) throw new Error('請輸入姓名')
        const birth = readRowBirthInput(row)
        const input = {
          name: name,
          gender: gender,
          calendar: birth.calendar,
          date: birth.date,
          timeIndex: birth.timeIndex,
          isLeap: birth.isLeap,
          initialChartType: basePayload.initialChartType || 'natal',
          yearlyYear: basePayload.yearlyYear || new Date().getFullYear(),
        }
        const a = compute(input)
        const payload = buildSavePayload(input, a)
        await window.ZiweiAuth.api('/api/charts/' + chartId, {
          method: 'PATCH',
          body: JSON.stringify({ phone: phone, payload: payload }),
        })
        savedRowSnapshots.delete(chartId)
        editingChartId = null
        await loadSavedCharts(savedChartSearchQuery)
      } catch (err) {
        alert(err.message || '儲存失敗')
        saveBtn.disabled = false
      }
    }

            '<td class="db-gender-cell">' +

    async function loadSavedCharts(search) {
      const list = document.getElementById('savedChartList')

      try {

    function normalizeDate(date) {
      const [y, m, d] = date.split('-')
      return `${Number(y)}-${Number(m)}-${Number(d)}`
    }

    function compute(input) {
      const { gender, calendar, date, timeIndex, isLeap } = input
      const d = normalizeDate(date)
      if (calendar === 'lunar') {
        return astro.byLunar(d, timeIndex, gender, isLeap, true, 'zh-TW')
      }
      return astro.bySolar(d, timeIndex, gender, true, 'zh-TW')
    }

    function centerBirthText(a, input) {
      const { yearly, hourly } = a.rawDates.chineseDate
      const gz = yearly[0] + yearly[1]
      const hour = hourly[1] || '寅'

      const lm = a.lunarDate.match(/([正二三四五六七八九十冬臘閏]+)月([初十廿三]*[一二三四五六七八九十]+)/)
      const lunarLine = lm ? `農曆 ${lm[1]}月${lm[2]}` : ''

      if (input.calendar === 'lunar') {
        const [y, m, d] = normalizeDate(input.date).split('-')
        return {
          line1: `${y} ${gz} 年`,
          line2: `${m} 月 ${d} 日 ${hour} 時`,
          lunarNote: '',
        }
      }

      const [sy, sm, sd] = a.solarDate.split('-').map(Number)
      return {
        line1: `${sy} ${gz} 年`,
        line2: `${sm} 月 ${sd} 日 ${hour} 時`,
        lunarNote: lunarLine,
      }
    }

    function updateCalendarUI() {

      document.getElementById('lunarDateFields').classList.toggle('hidden', !lunar)
      document.getElementById('solarDateFields').classList.toggle('hidden', lunar)
      document.getElementById('leapRow').classList.toggle('hidden', !lunar)
      document.getElementById('dateLabel').textContent = lunar ? '農曆出生日期' : '國曆出生日期'
      document.getElementById('calendarNote').textContent = lunar
        ? '以農曆排盤（陰曆）'
        : '以國曆排盤（陽曆）'
    }

    function mapStarForDisplay(star, chartMode, h, a) {
      const tableMutagen = getDisplayMutagen(h, a, chartMode, star.name)
      if (chartMode === 'yearly' || chartMode === 'decadal') {
        return {
          name: star.name,
          brightness: star.brightness,
          horoscopeMutagen: tableMutagen,
        }
      }
      return {
        name: star.name,
        brightness: star.brightness,
        mutagen: tableMutagen,
      }
    }

    function renderStarCol(star, role, chartMode) {
      const cls = starClassFor(star.name, role)
      const bright = star.brightness && role === 'major'
        ? `<span class="vbright">${formatBrightness(star.brightness)}</span>` : ''
      const mut = star.mutagen && chartMode !== 'yearly'
        ? mutagenHtml(star.mutagen, 'box') : ''
      const hMut = star.horoscopeMutagen && chartMode !== 'origin'
        ? mutagenHtml(star.horoscopeMutagen, chartMode === 'yearly' ? 'circle' : 'horoscope') : ''
      return `<span class="star-vcol ${cls}"><span class="vcol-inner"><span class="vname">${star.name}</span>${bright}</span>${mut}${hMut}</span>`
    }

    function renderStarsVertical(stars, role, chartMode) {
      return stars.map(s => renderStarCol(s, role, chartMode)).join('')
    }

    function renderPalace(p, h, a, sanFangRoles, chartMode, yearlyMonthlyByPalace, yearlyDailyByPalace, displayOptions) {
      const { leftPurple, leftGreen, rightGreen } = splitMinors([
        ...p.minorStars.map(s => ({ name: s.name, mutagen: s.mutagen })),
        ...p.adjectiveStars.map(s => ({ name: s.name, mutagen: s.mutagen })),
      ])
      const mapStar = s => mapStarForDisplay(s, chartMode, h, a)
      const leftPurpleM = leftPurple.map(mapStar)
      const leftGreenM = leftGreen.map(mapStar)
      const rightGreenM = rightGreen.map(mapStar)
      const majors = sortMajorStars(p.majorStars.map(s => mapStarForDisplay({
        name: s.name,
        brightness: s.brightness,
      }, chartMode, h, a)))

      const showDecadalAge = chartMode === 'origin' || chartMode === 'decadal'
      const daxian = showDecadalAge && p.decadal && shouldShowDecadal(p.decadal.range)
        ? `${p.decadal.range[0]} - ${p.decadal.range[1]}`
        : ''
      const isActiveDecadal = chartMode === 'decadal' && h.decadal.index === p.index
      const daxianHtml = daxian
        ? `<button type="button" class="decadal-slot ${isActiveDecadal ? 'active' : ''}" data-palace-index="${p.index}" data-age-start="${p.decadal.range[0]}">${daxian}</button>`
        : '<span class="decadal-slot"></span>'

      const displayName = getScopePalaceName(h, p.index, chartMode, p.name, displayOptions)
      const scopeName = displayName
      const shen = p.isBodyPalace && chartMode === 'origin' ? '<div class="shen">身</div>' : ''
      const hl = sanFangRoles.all.has(p.earthlyBranch) ? 'highlight' : ''
      const focus = sanFangRoles.target === p.earthlyBranch ? 'focus-palace' : ''
      const footerDim = (chartMode === 'origin' || chartMode === 'decadal' || chartMode === 'yearly') && sanFangRoles.related.has(p.earthlyBranch)
      const activeFlowIndex = yearlyMonthSelected ? h.monthly.index : h.yearly.index
      const activeMonthly = chartMode === 'yearly' && activeFlowIndex === p.index ? 'active-monthly-palace' : ''
      const activeLunar = parseLunarFromSolarDate(horoscopeDate)
      const monthlyEntry = chartMode === 'yearly' && yearlyMonthlyByPalace
        ? yearlyMonthlyByPalace.get(p.index)
        : null
      const dailyDays = chartMode === 'yearly' && yearlyDailyByPalace
        ? (yearlyDailyByPalace.get(p.index) || [])
        : []
      const monthlyBadge = monthlyEntry
        ? `<span class="monthly-badge ${yearlyMonthSelected && monthlyEntry.month === selectedFlowMonth ? 'active' : ''}" title="${monthlyEntry.month}月 ${monthlyEntry.gz}">${monthlyEntry.month}</span>`
        : ''
      const dailyDaysHtml = dailyDays.length
        ? `<div class="daily-days">${dailyDays.join(', ')}</div>`
        : ''

      return `<div class="palace ${hl} ${focus} ${activeMonthly}" data-scope-palace="${scopeName}" data-flow-month="${monthlyEntry ? monthlyEntry.month : ''}" title="單擊：三方四正；雙擊：流月命宮">
        ${shen}
        ${dailyDaysHtml}
        <div class="palace-stars">
          <div class="stars-left">
            <div class="stars-row stars-row-1">${renderStarsVertical(leftPurpleM, 'left-purple', chartMode)}</div>
            <div class="stars-row stars-row-2">${renderStarsVertical(leftGreenM, 'left-green', chartMode)}</div>
          </div>
          <div class="stars-right">${renderStarsVertical(rightGreenM, 'right-green', chartMode)}${renderStarsVertical(majors, 'major', chartMode)}</div>
        </div>
        <div class="palace-bottom ${footerDim ? 'palace-footer-dimmed' : ''}">
          <div class="palace-footer-grid">
            ${daxianHtml}
            <span class="gz-gan">${p.heavenlyStem}</span>
            <div class="palace-label"><span class="monthly-badges">${monthlyBadge}</span>(${formatPalaceName(displayName)})</div>
            <span class="gz-zhi">${p.earthlyBranch}</span>
          </div>
        </div>
      </div>`
    }

    function renderCenter(name, a, h, input) {

      const scopeGz = scopeItem ? `${scopeItem.heavenlyStem}${scopeItem.earthlyBranch}` : ''
      const decadalPalace = chartMode === 'decadal' ? a.palace(h.decadal.index) : null
      const decadalRange = decadalPalace?.decadal?.range
      const activeLunar = parseLunarFromSolarDate(horoscopeDate)

      const scopeLine = scopeGz
        ? `<div class="center-scope">${MODE_TAG[chartMode]}：${scopeGz}${chartMode === 'decadal' && decadalRange ? `<span class="scope-range"> (${decadalRange[0]}–${decadalRange[1]} 歲)</span>` : ''}</div>`

      const flowScopeLine = chartMode === 'yearly' && yearlyMonthSelected && selectedFlowMonth
        ? `<div class="center-scope center-flow-scope">

            ${showYearlyDaily ? `<div class="center-control-meta">流日：農曆 ${selectedFlowMonth} 月 1–${daysInLunarMonth(selectedFlowLunarYear, selectedFlowMonth, selectedFlowIsLeap)} 日分布</div>` : ''}

          `<button type="button" class="center-toggle-btn ${showYearlyDaily ? 'active' : ''}" id="toggleYearlyDaily" ${yearlyMonthSelected ? '' : 'disabled'} title="${yearlyMonthSelected ? '' : '請先雙擊宮位選擇流月'}">${showYearlyDaily ? '隱藏流日' : '顯示流日'}</button>`
      } else {
        yearControl = `<label class="center-control-row"><span>論命日期</span><input type="date" id="horoscopeDate" value="${horoscopeDate}"/></label>`
      }

      return `<div class="center">
        <div class="center-top-right">
          ${yearControl}
        </div>
        <div class="center-body">
          <div class="center-info">
            <div>
              ${backToNatal}

              ${flowScopeLine}
              <div class="center-birth">
                <div>${b.line1}</div>
                <div>${b.line2}</div>
                ${lunarNote}
              </div>
              <div class="center-bazi">
                ${renderCenterBaziBlock(a)}
              </div>
              <div class="center-age">${new Date(horoscopeDate).getFullYear()}<br>${age} 歲</div>
            </div>
            <div class="center-brand">國際日舜堂</div>
          </div>
          <div class="center-vtext">
            <div class="vtext tag">${MODE_TAG[chartMode]}</div>
            <div class="vtext name">${name || '匿名'}</div>
            <div class="vtext title">${MODE_TITLE[chartMode]}</div>
          </div>
        </div>
      </div>`
    }

    const CHART_W = 600
    const CHART_H = 400

    function branchLinePoint(branch) {
      const p = BRANCH_POS[branch]
      if (!p) return null
      const cellW = CHART_W / 4
      const cellH = CHART_H / 4
      const centerLeft = cellW
      const centerRight = cellW * 3
      const centerTop = cellH
      const centerBottom = cellH * 3
      const [row, col] = p

      if (row === 0) {
        if (col === 0) return { x: centerLeft, y: centerTop }
        if (col === 3) return { x: centerRight, y: centerTop }
        return { x: (col + 0.5) * cellW, y: centerTop }
      }
      if (row === 3) {
        if (col === 0) return { x: centerLeft, y: centerBottom }
        if (col === 3) return { x: centerRight, y: centerBottom }
        return { x: (col + 0.5) * cellW, y: centerBottom }
      }
      if (col === 0) return { x: centerLeft, y: (row + 0.5) * cellH }
      if (col === 3) return { x: centerRight, y: (row + 0.5) * cellH }
      return null
    }

    function renderLines(a, h) {
      const chartMode = resolveEffectiveChartMode()
      const scope = palaceNameScopeForMode(chartMode, yearlyDisplayOptions(chartMode))
      const s = scope === 'origin'
        ? a.surroundedPalaces(selectedPalaceName)
        : h.surroundPalaces(selectedPalaceName, scope)
      const lineEls = []

      const soulPt = branchLinePoint(s.target.earthlyBranch)
      const wealthPt = branchLinePoint(s.wealth.earthlyBranch)
      const careerPt = branchLinePoint(s.career.earthlyBranch)
      const travelPt = branchLinePoint(s.opposite.earthlyBranch)

      if (soulPt && wealthPt) lineEls.push(`<line x1="${soulPt.x}" y1="${soulPt.y}" x2="${wealthPt.x}" y2="${wealthPt.y}"/>`)
      if (soulPt && careerPt) lineEls.push(`<line x1="${soulPt.x}" y1="${soulPt.y}" x2="${careerPt.x}" y2="${careerPt.y}"/>`)
      if (soulPt && travelPt) lineEls.push(`<line x1="${soulPt.x}" y1="${soulPt.y}" x2="${travelPt.x}" y2="${travelPt.y}"/>`)
      if (wealthPt && careerPt) lineEls.push(`<line x1="${wealthPt.x}" y1="${wealthPt.y}" x2="${careerPt.x}" y2="${careerPt.y}"/>`)

      return `<svg class="chart-lines" viewBox="0 0 ${CHART_W} ${CHART_H}" preserveAspectRatio="none">${lineEls.join('')}</svg>`
    }

    function renderChart(name, a, input) {
      currentInput = input
      currentAstrolabe = a
      const chartMode = resolveEffectiveChartMode()
      const h = a.horoscope(horoscopeDate, input.timeIndex)
      const activeLunar = parseLunarFromSolarDate(horoscopeDate)
      const yearlyMonthlyByPalace = chartMode === 'yearly'
        ? computeYearlyMonthlyByPalace(a, activeLunar.year, input.timeIndex)
        : null
      const yearlyDailyByPalace = chartMode === 'yearly' && showYearlyDaily && yearlyMonthSelected && selectedFlowMonth
        ? computeYearlyDailyByPalace(a, selectedFlowLunarYear, selectedFlowMonth, input.timeIndex, selectedFlowIsLeap)
        : null
      const map = new Map(a.palaces.map(p => [p.earthlyBranch, p]))
      const displayOpts = yearlyDisplayOptions(chartMode)
      const sanFangRoles = getSanFangBranchRoles(a, h, selectedPalaceName, chartMode, displayOpts)
      let centerDone = false
      let html = '<div class="chart-outer"><div class="chart-grid">'
      html += renderLines(a, h)

      GRID.forEach((row, ri) => {
        row.forEach((cell, ci) => {
          if (cell === 'C') {
            if (ri === 1 && ci === 1 && !centerDone) {
              centerDone = true
              html += `<div class="cell center" style="grid-row:2/4;grid-column:2/4">${renderCenter(name, a, h, input)}</div>`
            }
            return
          }
          const p = map.get(cell)
          if (!p) return
          html += `<div class="cell" style="grid-row:${ri+1};grid-column:${ci+1}">${renderPalace(p, h, a, sanFangRoles, chartMode, yearlyMonthlyByPalace, yearlyDailyByPalace, displayOpts)}</div>`
        })
      })

      html += '</div></div>'
      document.getElementById('chartView').innerHTML = html

      document.querySelectorAll('.palace[data-scope-palace]').forEach(el => {
        el.addEventListener('click', () => {
          const mode = resolveEffectiveChartMode()
          if (mode !== 'yearly') {
            selectedPalaceName = el.dataset.scopePalace
            renderChart(name, a, input)
            return
          }
          if (palaceClickTimer) clearTimeout(palaceClickTimer)
          palaceClickTimer = setTimeout(() => {
            selectedPalaceName = el.dataset.scopePalace
            palaceClickTimer = null
            renderChart(name, a, input)
          }, 250)
        })
        el.addEventListener('dblclick', e => {
          e.preventDefault()
          if (palaceClickTimer) {
            clearTimeout(palaceClickTimer)
            palaceClickTimer = null
          }
          if (resolveEffectiveChartMode() !== 'yearly') return
          const month = Number(el.dataset.flowMonth)
          if (!month) return
          const activeLunar = parseLunarFromSolarDate(horoscopeDate)
          yearlyMonthSelected = true
          selectedFlowLunarYear = activeLunar.year
          selectedFlowMonth = month
          selectedFlowIsLeap = false
          horoscopeDate = horoscopeDateFromLunarYearMonthDay(
            selectedFlowLunarYear,
            selectedFlowMonth,
            activeLunar.day,
            false,
          )
          selectedPalaceName = '命宮'
          renderChart(name, a, input)
        })
      })

      document.querySelectorAll('.decadal-slot[data-age-start]').forEach(btn => {
        btn.addEventListener('click', e => {
          e.stopPropagation()
          if (initialChartType !== 'natal') return
          showLines = true
          horoscopeDate = horoscopeDateForNominalAge(a.solarDate, Number(btn.dataset.ageStart))
          selectedPalaceName = '命宮'
          renderChart(name, a, input)
        })
      })

      document.getElementById('backToNatal')?.addEventListener('click', () => {
        showLines = false
        horoscopeDate = todaySolarDate()
        selectedPalaceName = '命宮'
        renderChart(name, a, input)
      })

      document.getElementById('centerYearlyYear')?.addEventListener('change', e => {
        const year = Number(e.target.value)
        if (year >= 1900 && year <= 2100) {
          yearlyYear = year
          yearlyMonthSelected = false
          showYearlyDaily = false
          selectedFlowLunarYear = null
          selectedFlowMonth = null
          selectedFlowIsLeap = false
          const { month, day } = parseHoroscopeDateParts(horoscopeDate)
          horoscopeDate = horoscopeDateForYearMonthDay(year, month, day)
          selectedPalaceName = '命宮'
          renderChart(name, a, input)
        }
      })

      document.getElementById('toggleYearlyDaily')?.addEventListener('click', () => {
        if (!yearlyMonthSelected) return
        showYearlyDaily = !showYearlyDaily
        renderChart(name, a, input)
      })

      document.getElementById('horoscopeDate')?.addEventListener('change', e => {
        horoscopeDate = e.target.value || todaySolarDate()
        selectedPalaceName = '命宮'
        renderChart(name, a, input)
      })
    }

    function run() {
      showChartView()
      try {
        const input = getInput()
        const a = compute(input)
        initialChartType = input.initialChartType
        showLines = false
        selectedPalaceName = '命宮'
        if (initialChartType === 'yearly') {
          yearlyYear = input.yearlyYear
          yearlyMonthSelected = false
          showYearlyDaily = false
          selectedFlowLunarYear = null
          selectedFlowMonth = null
          selectedFlowIsLeap = false
          horoscopeDate = horoscopeDateForYear(yearlyYear)
        } else {
          horoscopeDate = todaySolarDate()
        }
        renderChart(input.name, a, input)
      } catch (err) {
        document.getElementById('chartView').innerHTML =
          `<div class="error-box">排盤失敗：${err.message || err}</div>`
      }
    }

    document.getElementById('submitBtn').addEventListener('click', run)

    document.getElementById('printChartBtn')?.addEventListener('click', function () {
      const view = document.getElementById('chartView')
      if (!view || view.querySelector('.chart-placeholder') || view.querySelector('.error-box')) {
        alert('請先完成排盤後再列印')
        return
      }
      window.print()
    })

    document.getElementById('saveChartBtn')?.addEventListener('click', async function () {
      try {
        await saveCurrentChart()
      } catch (err) {
        alert(err.message || '儲存失敗')
      }
    })

    document.getElementById('chartDbBtn')?.addEventListener('click', showChartDatabase)
    document.getElementById('chartDbBackBtn')?.addEventListener('click', showChartView)

    document.getElementById('savedChartSearchBtn')?.addEventListener('click', function () {
      loadSavedCharts(document.getElementById('savedChartSearch')?.value || '')
    })

    document.getElementById('savedChartSearch')?.addEventListener('keydown', function (e) {
      if (e.key === 'Enter') {
        e.preventDefault()
        loadSavedCharts(e.target.value || '')
      }
    })

    document.querySelectorAll('input[name="calendar"]').forEach(el => {
      el.addEventListener('change', () => {
        const lunar = document.querySelector('input[name="calendar"]:checked').value === 'lunar'
        if (lunar) {
          document.getElementById('lunarYear').value = ''
          document.getElementById('lunarMonth').value = ''
          document.getElementById('lunarDay').value = ''
        } else {
          document.getElementById('solarDate').value = todaySolarDate()
        }
        updateCalendarUI()
      })
    })

    document.getElementById('solarDate').value = todaySolarDate()
    document.getElementById('yearlyYear').value = new Date().getFullYear()
    horoscopeDate = todaySolarDate()
    updateCalendarUI()
    updateChartTypeUI()

    document.querySelectorAll('input[name="chartType"]').forEach(el => {
      el.addEventListener('change', updateChartTypeUI)
    })
    }
  </script>
  <script src="./vendor/auth-common.js"></script>
  <script src="./vendor/auth-app.js"></script>
  </body>
</html>
