services:
  - type: web
    name: rishuntang-ziwei-api
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    plan: free
    envVars:
      - key: NODE_VERSION
        value: "22.12.0"
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_EMAIL
        value: admin@rishuntang.com
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_NAME
        value: 管理員
      - key: ADMIN_PHONE
        value: "0900000000"
