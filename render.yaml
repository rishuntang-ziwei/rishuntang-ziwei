services:
  - type: web
    name: rishuntang-ziwei-api
    runtime: node
    rootDir: server
    buildCommand: npm install --include=dev && npm run build
    startCommand: node dist/index.js
    healthCheckPath: /api/health
    plan: free
    envVars:
      - key: NODE_VERSION
        value: "22.12.0"
      - key: NODE_OPTIONS
        value: --experimental-sqlite
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_EMAIL
        value: admin@rishuntang.com
      - key: ADMIN_PASSWORD
        value: RsTZiWei2026!Admin
      - key: ADMIN_NAME
        value: 管理員
      - key: ADMIN_PHONE
        value: "0900000000"
